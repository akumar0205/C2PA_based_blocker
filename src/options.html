<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C2PA AI Image Blocker Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <div class="header">
        <h1>C2PA AI Image Blocker</h1>
        <p class="subtitle">Detect and block AI-generated images using C2PA cryptographic verification</p>
      </div>

      <div class="section">
        <h2 class="section-title">General Settings</h2>
        
        <label class="option-row">
          <input id="enabled" type="checkbox" />
          <div class="option-content">
            <span class="option-label">Enable image replacement</span>
            <span class="option-description">Automatically replace detected AI-generated images with a warning placeholder</span>
          </div>
        </label>
      </div>

      <div class="section">
        <h2 class="section-title">Detection Settings</h2>
        
        <label class="option-row">
          <input id="verifyCryptographic" type="checkbox" />
          <div class="option-content">
            <span class="option-label">Cryptographic verification</span>
            <span class="option-description">Verify C2PA signatures using Web Crypto API for higher confidence detection</span>
          </div>
        </label>

        <label class="option-row">
          <input id="strictMode" type="checkbox" />
          <div class="option-content">
            <span class="option-label">Strict mode</span>
            <span class="option-description">Replace images when C2PA metadata exists but cannot be cryptographically verified</span>
          </div>
        </label>
      </div>

      <div class="section allowlist-section">
        <label for="allowlist" class="allowlist-label">Allowlist domains</label>
        <span class="allowlist-description">Domains where image replacement will be disabled. Separate with commas or new lines.</span>
        <textarea id="allowlist" placeholder="example.com&#10;news-site.org&#10;myportfolio.com"></textarea>
      </div>

      <div class="button-group">
        <button id="saveButton">Save options</button>
        <p id="status" role="status" aria-live="polite"></p>
      </div>
    </main>

    <script src="options.js"></script>
  </body>
</html>
