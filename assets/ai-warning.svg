<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500" role="img" aria-label="AI generated image replaced">
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F7F3EB"/>
      <stop offset="100%" stop-color="#EDE6D8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="500" fill="url(#bgGradient)"/>
  
  <!-- Inner border -->
  <rect x="24" y="24" width="752" height="452" fill="none" stroke="#B8AA95" stroke-width="3" stroke-dasharray="10 6" rx="4"/>
  
  <!-- Icon: Circle with AI text -->
  <circle cx="400" cy="160" r="50" fill="none" stroke="#7C6F5A" stroke-width="3"/>
  <text x="400" y="172" text-anchor="middle" font-size="32" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" fill="#7C6F5A" font-weight="600">
    AI
  </text>
  
  <!-- Main title -->
  <text x="400" y="260" text-anchor="middle" font-size="40" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" fill="#4A3F35" font-weight="700">
    Image Replaced
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="310" text-anchor="middle" font-size="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" fill="#7C6F5A">
    This image was AI generated
  </text>
  
  <!-- Bottom info line -->
  <text x="400" y="420" text-anchor="middle" font-size="13" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif" fill="#9A8B76">
    Verified by C2PA AI Image Blocker
  </text>
</svg>
