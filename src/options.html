<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>C2PA AI Image Blocker Options</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main>
      <div class="header">
        <h1>C2PA AI Image Blocker</h1>
        <p class="subtitle">Soft-warning by default with explainable AI-signal annotations.</p>
      </div>

      <div class="section">
        <h2 class="section-title">General Settings</h2>

        <label class="option-row">
          <input id="enabled" type="checkbox" />
          <div class="option-content">
            <span class="option-label">Enable image scanning</span>
            <span class="option-description">Analyze images for C2PA + AI signals on supported pages.</span>
          </div>
        </label>
      </div>

      <div class="section">
        <h2 class="section-title">Blocking Behavior</h2>

        <label class="field-label" for="replaceMode">Mode</label>
        <select id="replaceMode">
          <option value="annotate">Soft warning (recommended)</option>
          <option value="replace">Auto replace flagged images</option>
        </select>

        <label class="field-label" for="autoReplaceConfidence">Auto replace threshold</label>
        <select id="autoReplaceConfidence">
          <option value="high">High confidence only (verified AI)</option>
          <option value="medium">Medium + high confidence</option>
          <option value="low">All flagged confidence levels</option>
        </select>

        <label class="option-row">
          <input id="strictMode" type="checkbox" />
          <div class="option-content">
            <span class="option-label">Strict mode</span>
            <span class="option-description">Also replace unverified C2PA images even without AI claim (replace mode only).</span>
          </div>
        </label>
      </div>

      <div class="section">
        <h2 class="section-title">Detection Settings</h2>

        <label class="option-row">
          <input id="verifyCryptographic" type="checkbox" />
          <div class="option-content">
            <span class="option-label">Cryptographic verification</span>
            <span class="option-description">Verify C2PA signatures using Web Crypto API for higher-confidence detection.</span>
          </div>
        </label>
      </div>

      <div class="section allowlist-section">
        <label for="allowlist" class="allowlist-label">Allowlist domains</label>
        <span class="allowlist-description">Domains where image replacement/annotation will be disabled. Separate with commas or new lines.</span>
        <textarea id="allowlist" placeholder="example.com&#10;news-site.org&#10;myportfolio.com"></textarea>
      </div>

      <div class="button-group">
        <button id="saveButton">Save options</button>
        <p id="status" role="status" aria-live="polite"></p>
      </div>
    </main>

    <script src="options.js"></script>
  </body>
</html>
